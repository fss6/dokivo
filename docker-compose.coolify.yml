
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dokivo-web
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    volumes:
      - .:/app
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/up"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    networks:
      - coolify
      - ipv6_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dokivo-worker
    command: bash -c "bundle exec sidekiq -C config/sidekiq.yml"
    volumes:
      - .:/app
    environment:
      REDIS_URL: ${REDIS_URL}
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "ruby",
          "-e",
          "f='tmp/pids/sidekiq.pid'; exit(1) unless File.exist?(f); pid=File.read(f).strip; exit(system('kill','-0',pid)?0:1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - coolify
      - ipv6_net

networks:
  coolify:
    external: true
    name: coolify
  ipv6_net:
    driver: bridge
    enable_ipv6: true
